background {
    monitor =
    path = $HOME/.cache/wal/wal
    blur_passes = 3
    blur_size = 6
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.75
    vibrancy = 0.1696
}
input-field {
    monitor =
    size = 240, 45
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.05)
    inner_color = rgba(20, 20, 25, 0.65)
    font_color = rgb(255, 255, 255)
    check_color = $color5
    fail_color = rgb(255, 85, 85)
    fade_on_empty = false
    rounding = 8
    placeholder_text = <span font_family="Iosevka Custom, JetBrainsMono Nerd Font" font_weight="300" foreground="
    position = 0, -60
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = rgba(255, 255, 255, 0.95)
    font_size = 94
    font_family = Iosevka Custom, Source Han Sans HW Arabic, JetBrainsMono Nerd Font
    font_weight = 300
    position = 0, 120
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%p")"
    color = $color5
    font_size = 14
    font_family = Iosevka Custom, JetBrainsMono Nerd Font
    font_weight = 400
    position = 0, 45
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.55)
    font_size = 13
    font_family = Iosevka Custom, Source Han Sans HW Arabic, JetBrainsMono Nerd Font
    font_weight = 300
    position = 0, 15
    halign = center
    valign = center
}
